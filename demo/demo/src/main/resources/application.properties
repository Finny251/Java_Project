spring.application.name=multi-platform-notification-engine

# Database Connection Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_engine
spring.datasource.username=engine_user
spring.datasource.password=engine_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
